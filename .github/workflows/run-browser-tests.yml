name: Browser tests

on: workflow_call

concurrency:
  group: browser-tests-${{ github.workflow }}-${{ github.head_ref || github.ref_name }}
  cancel-in-progress: true

defaults:
  run:
    shell: bash
    working-directory: test/docker

permissions: {}

jobs:
  run-tests:
    name: Browser
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        browser: [chromium, firefox]
    steps:
      - name: Pull repository
        uses: actions/checkout@v7

      - name: Start Docker
        run: docker compose up web mocks --detach

      - name: Run Cucumber tests on ${{ matrix.browser }}
        run: docker compose up cucumber --exit-code-from cucumber
        env:
          BROWSER: ${{ matrix.browser }}

      - name: Stop Docker
        if: ${{ always() }}
        run: docker compose down

  visual-tests:
    name: Visual regression
    runs-on: ubuntu-latest
    needs: run-tests
    steps:
      - name: Pull repository
        uses: actions/checkout@v7

      - name: Start Docker
        run: docker compose up web mocks --detach

      - name: Run visual regression tests
        run: docker compose up visual --exit-code-from visual

      - name: Stop Docker
        if: ${{ always() }}
        run: docker compose down
